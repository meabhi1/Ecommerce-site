<div class="container">

  <div class="card">

    <button onclick="addToCart(1,'Blue T-Shirt',499)">Add to Cart</button>
    
<button onclick="addToWishlist('Blue T-Shirt',499)">❤️ Wishlist</button>

  <div class="card">
